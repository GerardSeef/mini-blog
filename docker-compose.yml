version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mini-blog-app
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: miniblog
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: test_secret_key_change_in_production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mini-blog
    command: sh -c "[ ! -f .env ] && cp .env.example .env || true && composer install --no-interaction && php artisan migrate --force || true && php artisan serve --host=0.0.0.0"

  java-api:
    build:
      context: ./java
      dockerfile: Dockerfile
    container_name: mini-blog-java-api
    working_dir: /app
    ports:
      - "8080:8080"
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: miniblog
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: test_secret_key_change_in_production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mini-blog

  db:
    image: postgres:16-alpine
    container_name: mini-blog-db
    environment:
      POSTGRES_DB: miniblog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mini-blog

volumes:
  postgres_data:

networks:
  mini-blog:
    driver: bridge
